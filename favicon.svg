:root{--bg:#080d1a;--surface:#0f1624;--card:#161e30;--card-hover:#1c2640;--border:#1e2d4a;--accent:#22c55e;--accent-dim:#22c55e26;--accent-2:#3b82f6;--accent-2-dim:#3b82f626;--warn:#f59e0b;--warn-dim:#f59e0b26;--danger:#ef4444;--text:#f0f4ff;--text-muted:#6b7da0;--text-dim:#3a4a6b;--radius:12px;--radius-sm:8px;--nav-h:64px;--header-h:56px}*{box-sizing:border-box;margin:0;padding:0}html,body,#root{background:var(--bg);height:100%;color:var(--text);-webkit-font-smoothing:antialiased;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif;font-size:15px;line-height:1.5}body{overscroll-behavior:none}#root{flex-direction:column;max-width:480px;height:100%;margin:0 auto;display:flex;position:relative}.view{padding:16px 16px calc(var(--nav-h) + 24px);-webkit-overflow-scrolling:touch;flex:1;overflow-y:auto}.header{z-index:10;background:var(--bg);border-bottom:1px solid var(--border);height:var(--header-h);flex-shrink:0;align-items:center;gap:10px;padding:0 16px;display:flex;position:sticky;top:0}.header h1{letter-spacing:-.3px;font-size:17px;font-weight:700}.header-badge{background:var(--accent-dim);color:var(--accent);border-radius:20px;margin-left:auto;padding:3px 10px;font-size:12px;font-weight:600}.bottom-nav{width:100%;max-width:480px;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom);display:flex;position:fixed;bottom:0;left:50%;transform:translate(-50%)}.nav-btn{cursor:pointer;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase;background:0 0;border:none;flex-direction:column;flex:1;justify-content:center;align-items:center;gap:3px;padding:8px 0;font-size:10px;font-weight:600;transition:color .15s;display:flex}.nav-btn svg{stroke:currentColor;fill:none;stroke-width:1.8px;stroke-linecap:round;stroke-linejoin:round;width:22px;height:22px}.nav-btn.active{color:var(--accent)}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;padding:16px}.card.accent-border{border-color:var(--accent)}.card.blue-border{border-color:var(--accent-2)}.card-title{text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:10px;font-size:11px;font-weight:700}.stat-grid{grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px;margin-bottom:12px;display:grid}.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center;padding:12px 10px}.stat-value{margin-bottom:4px;font-size:22px;font-weight:800;line-height:1}.stat-value.green{color:var(--accent)}.stat-value.blue{color:var(--accent-2)}.stat-value.warn{color:var(--warn)}.stat-label{text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);font-size:10px;font-weight:600}.session-items{list-style:none}.session-items li{border-bottom:1px solid var(--border);color:var(--text);align-items:flex-start;gap:8px;padding:7px 0;font-size:14px;display:flex}.session-items li:last-child{border-bottom:none}.session-items li:before{content:"›";color:var(--accent);flex-shrink:0;font-size:16px;font-weight:700;line-height:1.4}.form-group{margin-bottom:14px}.form-label{text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;font-size:12px;font-weight:600;display:block}.form-input,.form-select,.form-textarea{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);width:100%;color:var(--text);-webkit-appearance:none;outline:none;padding:11px 13px;font-size:15px;transition:border-color .15s}.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}.form-textarea{resize:vertical;min-height:80px;font-family:inherit}.form-row{grid-template-columns:1fr 1fr;gap:10px;display:grid}.form-hint{color:var(--text-muted);margin-top:4px;font-size:12px}.pace-display{background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--radius-sm);color:var(--accent);text-align:center;margin-top:4px;padding:10px 13px;font-size:18px;font-weight:700}.btn{border-radius:var(--radius-sm);cursor:pointer;border:none;justify-content:center;align-items:center;gap:8px;width:100%;padding:13px 20px;font-size:15px;font-weight:700;transition:opacity .15s,transform .1s;display:flex}.btn:active{transform:scale(.97)}.btn-primary{background:var(--accent);color:#000}.btn-secondary{background:var(--accent-2);color:#fff}.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-danger{color:var(--danger);border:1px solid var(--danger);background:0 0;width:auto;padding:8px 14px;font-size:13px}.btn:disabled{opacity:.4;cursor:not-allowed}.badge{text-transform:uppercase;letter-spacing:.5px;border-radius:20px;align-items:center;padding:3px 10px;font-size:11px;font-weight:700;display:inline-flex}.badge-green{background:var(--accent-dim);color:var(--accent)}.badge-blue{background:var(--accent-2-dim);color:var(--accent-2)}.badge-warn{background:var(--warn-dim);color:var(--warn)}.badge-muted{color:var(--text-muted);background:#6b7da01f}.progress-bar-track{background:var(--border);border-radius:99px;height:8px;overflow:hidden}.progress-bar-fill{background:linear-gradient(90deg, var(--accent-2), var(--accent));border-radius:99px;height:100%;transition:width .4s}.log-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);align-items:center;gap:12px;margin-bottom:8px;padding:12px 14px;display:flex}.log-icon{background:var(--accent-dim);border-radius:9px;flex-shrink:0;justify-content:center;align-items:center;width:38px;height:38px;font-size:18px;display:flex}.log-icon.strength{background:var(--accent-2-dim)}.log-icon.recovery{background:var(--warn-dim)}.log-meta{flex:1;min-width:0}.log-title{white-space:nowrap;text-overflow:ellipsis;font-size:14px;font-weight:600;overflow:hidden}.log-sub{color:var(--text-muted);margin-top:2px;font-size:12px}.log-right{flex-direction:column;flex-shrink:0;align-items:flex-end;gap:4px;display:flex}.log-pace{color:var(--accent);font-size:13px;font-weight:700}.phase-tabs{-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:6px;margin-bottom:14px;padding-bottom:2px;display:flex;overflow-x:auto}.phase-tabs::-webkit-scrollbar{display:none}.phase-tab{background:var(--card);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;border-radius:20px;flex-shrink:0;padding:6px 14px;font-size:13px;font-weight:600;transition:all .15s}.phase-tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}.day-row{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden}.day-header{cursor:pointer;-webkit-user-select:none;user-select:none;align-items:center;gap:10px;padding:12px 14px;display:flex}.day-dot{border-radius:50%;flex-shrink:0;width:8px;height:8px}.day-dot.run{background:var(--accent)}.day-dot.strength{background:var(--accent-2)}.day-dot.conditioning{background:var(--warn)}.day-dot.recovery{background:var(--text-dim)}.day-name{flex:1;font-size:14px;font-weight:600}.day-subtitle{color:var(--text-muted);flex-shrink:0;margin-right:4px;font-size:12px}.day-chevron{color:var(--text-muted);font-size:12px;transition:transform .2s}.day-chevron.open{transform:rotate(180deg)}.day-body{padding:0 14px 12px}.benchmark-item{border-bottom:1px solid var(--border);align-items:center;gap:12px;padding:11px 0;display:flex}.benchmark-item:last-child{border-bottom:none}.bm-check{border:2px solid var(--border);border-radius:50%;flex-shrink:0;justify-content:center;align-items:center;width:26px;height:26px;font-size:13px;display:flex}.bm-check.done{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}.bm-check.current{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}.bm-info{flex:1;min-width:0}.bm-label{font-size:13px;font-weight:600}.bm-week{color:var(--text-muted);margin-top:2px;font-size:11px}.bm-target{color:var(--accent);flex-shrink:0;font-size:13px;font-weight:700}.divider{background:var(--border);height:1px;margin:14px 0}.empty-state{text-align:center;color:var(--text-muted);padding:40px 20px}.empty-state .empty-icon{opacity:.5;margin-bottom:12px;font-size:40px}.empty-state p{font-size:14px}.effort-row{align-items:center;gap:4px;display:flex}.effort-pip{background:var(--border);cursor:pointer;border-radius:3px;flex:1;height:6px;transition:background .1s}.effort-pip.filled{background:var(--accent)}.effort-label{color:var(--accent);text-align:right;min-width:18px;font-size:14px;font-weight:700}.seg-control{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);gap:2px;margin-bottom:14px;padding:3px;display:flex}.seg-btn{color:var(--text-muted);cursor:pointer;background:0 0;border:none;border-radius:6px;flex:1;padding:8px;font-size:13px;font-weight:600;transition:all .15s}.seg-btn.active{background:var(--card);color:var(--text)}.shin-warning{border-radius:var(--radius-sm);background:#ef444414;border:1px solid #ef44444d;margin-bottom:10px;padding:12px 14px}.shin-warning .sw-title{text-transform:uppercase;letter-spacing:.5px;color:var(--danger);margin-bottom:6px;font-size:12px;font-weight:700}.shin-warning li{color:#fca5a5;gap:6px;padding:3px 0;font-size:13px;list-style:none;display:flex}.shin-warning li:before{content:"!";color:var(--danger);font-weight:700}.race-hero{border:1px solid var(--accent);border-radius:var(--radius);text-align:center;background:linear-gradient(135deg,#0f1a10 0%,#0a1520 100%);margin-bottom:12px;padding:20px 16px}.race-hero .rh-label{text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:4px;font-size:11px;font-weight:700}.race-hero .rh-days{color:var(--accent);letter-spacing:-3px;font-size:56px;font-weight:900;line-height:1}.race-hero .rh-unit{color:var(--text-muted);margin-top:2px;font-size:14px;font-weight:600}.race-hero .rh-date{color:var(--text-muted);margin-top:8px;font-size:13px}.phase-hero{border:1px solid var(--border);border-radius:var(--radius);background:linear-gradient(135deg,#0a101f 0%,#0d1830 100%);margin-bottom:12px;padding:16px}.ph-top{align-items:center;gap:10px;margin-bottom:10px;display:flex}.ph-number{color:var(--accent);font-size:28px;font-weight:900;line-height:1}.ph-info{flex:1}.ph-name{font-size:17px;font-weight:700}.ph-date{color:var(--text-muted);margin-top:2px;font-size:12px}.today-session-card{border:1px solid var(--accent);border-radius:var(--radius);background:linear-gradient(135deg,#0a1a10 0%,#0a1520 100%);margin-bottom:12px;overflow:hidden}.tsc-header{background:var(--accent-dim);align-items:center;gap:8px;padding:10px 16px;display:flex}.tsc-day{text-transform:uppercase;letter-spacing:.8px;color:var(--accent);font-size:11px;font-weight:700}.tsc-title{padding:14px 16px 8px;font-size:15px;font-weight:700}.tsc-body{padding:0 16px 14px}
