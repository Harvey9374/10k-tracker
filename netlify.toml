[build]
  base = "app"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[functions."remove-bg"]
  runtime = "python3.11"

# Serve wardrobe SPA — force ensures it wins even over static file lookup
[[redirects]]
  from = "/wardrobe"
  to = "/wardrobe/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/wardrobe/"
  to = "/wardrobe/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/wardrobe/*"
  to = "/wardrobe/index.html"
  status = 200
  force = true

# SPA fallback for root fitness app
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
