[build]
  base = "app"
  command = "npm install && tsc -b && vite build && npm --prefix ../wardrobe install && npm --prefix ../wardrobe run build && mkdir -p dist/wardrobe && cp -r ../wardrobe/dist/. dist/wardrobe/"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[functions."remove-bg"]
  runtime = "python3.11"

[[redirects]]
  from = "/wardrobe"
  to = "/wardrobe/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/wardrobe/"
  to = "/wardrobe/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/wardrobe/*"
  to = "/wardrobe/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
