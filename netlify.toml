[build]
  base = "app"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[functions."remove-bg"]
  runtime = "python3.11"

# Redirect bare /wardrobe to /wardrobe/
[[redirects]]
  from = "/wardrobe"
  to = "/wardrobe/"
  status = 301
  force = true

# SPA fallback for wardrobe deep-links
[[redirects]]
  from = "/wardrobe/*"
  to = "/wardrobe/index.html"
  status = 200

# SPA fallback for root app
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
